# Copy this to .streamlit/secrets.toml and fill in your real values.
# Never commit secrets.toml to git — it is already in .gitignore.

# Supabase (get these from Project Settings → API in your Supabase dashboard)
supabase_url = "https://xxxxxxxxxxxx.supabase.co"
supabase_key = "eyJ..."   # use the service_role key, not the anon key

# Path to the source CSV (relative to app root, or absolute path)
csv_file_path = "data/input.csv"
# Alternative: load from a URL instead
# csv_url = "https://example.com/data.csv"
