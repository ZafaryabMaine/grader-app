# Copy this to .streamlit/secrets.toml and fill in your values.
google_sheet_id = "YOUR_GOOGLE_SHEET_ID"
# Or use google_sheet_name instead of google_sheet_id.
# google_sheet_name = "YOUR_GOOGLE_SHEET_NAME"

# Path to the source CSV (relative to app root, or absolute).
csv_file_path = "data/input.csv"
# Alternative: load from URL instead of local path.
# csv_url = "https://example.com/data.csv"

# Google Drive folder ID where final CSV and report are uploaded on submit.
google_drive_folder_id = "1_8mbBN-8e-W1yv4g-GvqC-gktiVFuc7D"

[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-project-id.iam.gserviceaccount.com"
client_id = "1234567890"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-service-account%40your-project-id.iam.gserviceaccount.com"
